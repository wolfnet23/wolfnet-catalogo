<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Arma tu Combo – Wolfnet IPTV</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>

<div class="overlay"></div>

<header class="header">
    <a href="index.html" class="back-btn">← Volver</a>
</header>

<!-- ============================
     TOTAL + BOTÓN COMPRAR ARRIBA
============================= -->
<div class="combo-header">
    <span class="combo-total">
        Tu combo actual vale: 
        <span id="total" class="total-zero">0€</span>
    </span>

    <button class="btn-comprar" onclick="comprarCombo()">
        Comprar combo
    </button>
</div>

<!-- ============================
     GRID DE SERVICIOS
============================= -->
<div class="grid-combo">

    <div class="combo-card" onclick="toggleServicio('Netflix',6)">
        <img src="img/netflix.png" class="combo-icon">
        <span class="combo-name">Netflix</span>
        <span class="combo-price">6€</span>
    </div>

    <div class="combo-card" onclick="toggleServicio('Disney+',4)">
        <img src="img/disney.png" class="combo-icon">
        <span class="combo-name">Disney+</span>
        <span class="combo-price">4€</span>
    </div>

    <div class="combo-card" onclick="toggleServicio('HBO Max',5)">
        <img src="img/hbo.png" class="combo-icon">
        <span class="combo-name">HBO Max</span>
        <span class="combo-price">5€</span>
    </div>

    <div class="combo-card" onclick="toggleServicio('Prime Video',5)">
        <img src="img/prime.png" class="combo-icon">
        <span class="combo-name">Prime Video</span>
        <span class="combo-price">5€</span>
    </div>

    <div class="combo-card" onclick="toggleServicio('Crunchyroll',4)">
        <img src="img/crunchy.png" class="combo-icon">
        <span class="combo-name">Crunchyroll</span>
        <span class="combo-price">4€</span>
    </div>

    <div class="combo-card" onclick="toggleServicio('IPTV',10)">
        <img src="img/iptv.png" class="combo-icon">
        <span class="combo-name">IPTV</span>
        <span class="combo-price">10€</span>
    </div>

    <div class="combo-card" onclick="toggleServicio('FlujoTV',10)">
        <img src="img/flujo.png" class="combo-icon">
        <span class="combo-name">FlujoTV</span>
        <span class="combo-price">10€</span>
    </div>

    <div class="combo-card" onclick="toggleServicio('YouTube Premium',20)">
        <img src="img/youtube.png" class="combo-icon">
        <span class="combo-name">YouTube Premium</span>
        <span class="combo-price">20€</span>
    </div>

    <div class="combo-card" onclick="toggleServicio('Spotify',20)">
        <img src="img/spotify.png" class="combo-icon">
        <span class="combo-name">Spotify</span>
        <span class="combo-price">20€</span>
    </div>

</div>

</body>
</html>
