<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Planes – Wolfnet IPTV</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="overlay"></div>

<header class="header">
    <a href="index.html" class="back-btn">← Volver</a>
</header>

<h1 class="combo-title">Planes por Servicio</h1>

<div class="planes-layout">

    <div class="planes-servicios">

        <div class="combo-card" onclick="mostrarPlanes('netflix')">
            <img src="img/netflix.png" class="combo-icon">
            <span class="combo-name">Netflix</span>
        </div>

        <div class="combo-card" onclick="mostrarPlanes('disney')">
            <img src="img/disney.png" class="combo-icon">
            <span class="combo-name">Disney+</span>
        </div>

        <div class="combo-card" onclick="mostrarPlanes('hbo')">
            <img src="img/hbo.png" class="combo-icon">
            <span class="combo-name">HBO Max</span>
        </div>

        <div class="combo-card" onclick="mostrarPlanes('prime')">
            <img src="img/prime.png" class="combo-icon">
            <span class="combo-name">Prime Video</span>
        </div>

        <div class="combo-card" onclick="mostrarPlanes('crunchy')">
            <img src="img/crunchy.png" class="combo-icon">
            <span class="combo-name">Crunchyroll</span>
        </div>

        <div class="combo-card" onclick="mostrarPlanes('iptv')">
            <img src="img/iptv.png" class="combo-icon">
            <span class="combo-name">IPTV</span>
        </div>

        <div class="combo-card" onclick="mostrarPlanes('flujo')">
            <img src="img/flujo.png" class="combo-icon">
            <span class="combo-name">FlujoTV</span>
        </div>

        <div class="combo-card" onclick="mostrarPlanes('spotify')">
            <img src="img/spotify.png" class="combo-icon">
            <span class="combo-name">Spotify</span>
        </div>

        <div class="combo-card" onclick="mostrarPlanes('youtube')">
            <img src="img/youtube.png" class="combo-icon">
            <span class="combo-name">YouTube Premium</span>
        </div>

    </div>

    <div class="planes-detalle">
        <div id="planes-container" class="planes-box">
            <p class="planes-placeholder">Selecciona un servicio para ver sus planes</p>
        </div>
    </div>

</div>

<!-- ============================= -->
<!-- ======== SCRIPT JS ========= -->
<!-- ============================= -->

<script>
const planes = {
    netflix: [
        { meses: 1, precio: 6 },
        { meses: 3, precio: 16 },
        { meses: 6, precio: 30 },
        { meses: 12, precio: 55 }
    ],
    disney: [
        { meses: 1, precio: 6 },
        { meses: 3, precio: 15 },
        { meses: 6, precio: 25 },
        { meses: 12, precio: 45 }
    ],
    hbo: [
        { meses: 1, precio: 6 },
        { meses: 3, precio: 15 },
        { meses: 6, precio: 25 },
        { meses: 12, precio: 45 }
    ],
    prime: [
        { meses: 1, precio: 5 },
        { meses: 3, precio: 14 },
        { meses: 6, precio: 25 },
        { meses: 12, precio: 40 }
    ],
    crunchy: [
        { meses: 1, precio: 6 }
    ],
    iptv: [
        { meses: 1, precio: 10 },
        { meses: 3, precio: 24 },
        { meses: 6, precio: 35 },
        { meses: 12, precio: 55 }
    ],
    flujo: [
        { meses: 1, precio: 10 },
        { meses: 3, precio: 25 },
        { meses: 6, precio: 40 },
        { meses: 12, precio: 60 }
    ],
    spotify: [
        { meses: 1, precio: 7 },
        { meses: 3, precio: 20 }
    ],
    youtube: [
        { meses: 3, precio: 20 }
    ]
};

function mostrarPlanes(servicio) {
    const contenedor = document.getElementById("planes-container");
    const lista = planes[servicio];

    let html = `
        <h2 style="text-align:center; margin-top:20px;">Planes de ${servicio.toUpperCase()}</h2>
        <table class="tabla-planes">
            <tr><th>Duración</th><th>Precio</th><th>Acción</th></tr>
    `;

    lista.forEach(p => {
        html += `
            <tr>
                <td>${p.meses} meses</td>
                <td>${p.precio}€</td>
                <td><button class="btn-wsp" onclick="comprar('${servicio}', ${p.meses}, ${p.precio})">Comprar</button></td>
            </tr>
        `;
    });

    html += `</table>`;
    contenedor.innerHTML = html;
}


// =======================================
// ===== FUNCIÓN COMPRAR CON API =========
// =======================================

function comprar(servicio, meses, precio) {
    const numero = "34624063991";

    const mensaje = 
`📦 *Plan seleccionado: ${servicio.toUpperCase()} – ${meses} mes(es) – ${precio}€*
Métodos de pago disponibles:

📲 Bizum:
• 624 06 39 91
• 624 74 89 28

🏦 Transferencia bancaria:
• IBAN: ES03 6893 0001 7000 0015 4710
• Titular: Wolffan Jiménez
• Concepto permitido: amigo, salida, café o merienda (elige solo uno)

📸 *Envíame la captura del pago* y 🤝 te activo tu cuenta en menos de 5 minutos.`;

    const url = `https://api.whatsapp.com/send?phone=${numero}&text=${encodeURIComponent(mensaje)}`;
    window.open(url, "_blank");
}
</script>

</body>
</html>
