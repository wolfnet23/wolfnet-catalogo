<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Planes – Wolfnet IPTV</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>

    <style>
        /* ===== FONDO Y ESTILO GENERAL ===== */
        body {
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }

        .header {
            padding: 20px;
        }

        .back {
            color: #00ff7f;
            font-size: 20px;
            text-decoration: none;
            font-weight: 700;
        }

        .servicios-container {
            text-align: center;
            padding: 20px;
        }

        .servicios-container h1 {
            font-size: 36px;
            font-weight: 800;
            margin-top: 10px;
        }

        /* ===== GRID DE SERVICIOS ===== */
        .grid-servicios {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            padding: 30px;
            max-width: 900px;
            margin: auto;
        }

        /* ===== TARJETAS PREMIUM ===== */
        .servicio {
            background: linear-gradient(135deg, #00ff7f, #00d46a);
            color: #fff;
            padding: 18px;
            border-radius: 14px;
            font-size: 20px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 0 20px rgba(0, 255, 127, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .servicio::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
            transform: rotate(25deg);
            transition: 0.4s;
        }

        .servicio:hover::before {
            top: -20%;
            left: -20%;
        }

        .servicio:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 0 25px rgba(0, 255, 127, 0.7);
            background: linear-gradient(135deg, #00ff7f, #00e676);
        }

        .icono-servicio {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        /* ===== TABLA DE PLANES ===== */
        .tabla-planes {
            width: 90%;
            max-width: 600px;
            margin: 30px auto;
            border-collapse: collapse;
            background: #111;
            color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,255,127,0.3);
        }

        .tabla-planes th, .tabla-planes td {
            padding: 14px;
            border-bottom: 1px solid #222;
            text-align: center;
            font-size: 18px;
        }

        .tabla-planes th {
            background: #00ff7f;
            color: #000;
            font-weight: 800;
        }

        .btn-wsp {
            background: #00ff7f;
            padding: 10px 18px;
            border-radius: 10px;
            color: #000;
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-wsp:hover {
            background: #00e676;
        }
    </style>
</head>

<body>

<header class="header">
    <a href="index.html" class="back">← Volver</a>
</header>

<div class="servicios-container">
    <h1>Elige tu servicio</h1>

    <div class="grid-servicios">

        <button class="servicio" onclick="mostrarPlanes('netflix')">
            <img src="img/netflix.png" class="icono-servicio"> Netflix
        </button>

        <button class="servicio" onclick="mostrarPlanes('disney')">
            <img src="img/disney.png" class="icono-servicio"> Disney+
        </button>

        <button class="servicio" onclick="mostrarPlanes('hbo')">
            <img src="img/hbo.png" class="icono-servicio"> HBO Max
        </button>

        <button class="servicio" onclick="mostrarPlanes('prime')">
            <img src="img/prime.png" class="icono-servicio"> Prime Video
        </button>

        <button class="servicio" onclick="mostrarPlanes('crunchy')">
            <img src="img/crunchy.png" class="icono-servicio"> Crunchyroll
        </button>

        <button class="servicio" onclick="mostrarPlanes('iptv')">
            <img src="img/iptv.png" class="icono-servicio"> IPTV
        </button>

        <button class="servicio" onclick="mostrarPlanes('flujo')">
            <img src="img/flujo.png" class="icono-servicio"> FlujoTV
        </button>

        <button class="servicio" onclick="mostrarPlanes('spotify')">
            <img src="img/spotify.png" class="icono-servicio"> Spotify
        </button>

        <button class="servicio" onclick="mostrarPlanes('youtube')">
            <img src="img/youtube.png" class="icono-servicio"> YouTube
        </button>

    </div>
</div>

<div id="planes-container"></div>

<script>
const planes = {
    netflix: [
        { meses: 1, precio: 6 },
        { meses: 3, precio: 16 },
        { meses: 6, precio: 30 },
        { meses: 12, precio: 55 }
    ],
    disney: [
        { meses: 1, precio: 6 },
        { meses: 3, precio: 15 },
        { meses: 6, precio: 25 },
        { meses: 12, precio: 45 }
    ],
    hbo: [
        { meses: 1, precio: 6 },
        { meses: 3, precio: 15 },
        { meses: 6, precio: 25 },
        { meses: 12, precio: 45 }
    ],
    prime: [
        { meses: 1, precio: 5 },
        { meses: 3, precio: 14 },
        { meses: 6, precio: 25 },
        { meses: 12, precio: 40 }
    ],
    crunchy: [
        { meses: 1, precio: 6 }
    ],
    iptv: [
        { meses: 1, precio: 10 },
        { meses: 3, precio: 24 },
        { meses: 6, precio: 35 },
        { meses: 12, precio: 55 }
    ],
    flujo: [
        { meses: 1, precio: 10 },
        { meses: 3, precio: 25 },
        { meses: 6, precio: 40 },
        { meses: 12, precio: 60 }
    ],
    spotify: [
        { meses: 1, precio: 7 },
        { meses: 3, precio: 20 }
    ],
    youtube: [
        { meses: 3, precio: 20 }
    ]
};

function mostrarPlanes(servicio) {
    const contenedor = document.getElementById("planes-container");
    const lista = planes[servicio];

    let html = `
        <h2 style="text-align:center; margin-top:20px;">Planes de ${servicio.toUpperCase()}</h2>
        <table class="tabla-planes">
            <tr><th>Duración</th><th>Precio</th><th>Acción</th></tr>
    `;

    lista.forEach(p => {
        html += `
            <tr>
                <td>${p.meses} meses</td>
                <td>${p.precio}€</td>
                <td><button class="btn-wsp" onclick="comprar(${p.precio}, ${p.meses})">Comprar</button></td>
            </tr>
        `;
    });

    html += `</table>`;
    contenedor.innerHTML = html;
}

function comprar(precio, meses) {
    window.location.href = `https://wa.me/34624063991?text=Hola,%20quiero%20comprar%20el%20plan%20de%20${meses}%20mes(es)%20por%20${precio}€`;
}
</script>

</body>
</html>
