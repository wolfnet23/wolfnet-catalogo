<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Planes – Wolfnet IPTV</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>

    <style>
        /* Estilos rápidos para que funcione sin depender del index */
        body {
            background: #0a0a0a;
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }

        .header {
            padding: 20px;
        }

        .back {
            color: #00ff7f;
            font-size: 20px;
            text-decoration: none;
            font-weight: 700;
        }

        .servicios-container {
            text-align: center;
            padding: 20px;
        }

        .grid-servicios {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .servicio {
            background: #00ff7f;
            color: #000;
            padding: 14px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .servicio:hover {
            background: #00e676;
        }

        .tabla-planes {
            width: 90%;
            max-width: 600px;
            margin: 30px auto;
            border-collapse: collapse;
            background: white;
            color: black;
            border-radius: 10px;
            overflow: hidden;
        }

        .tabla-planes th, .tabla-planes td {
            padding: 14px;
            border-bottom: 1px solid #ddd;
            text-align: center;
            font-size: 18px;
        }

        .tabla-planes th {
            background: #00ff7f;
            color: black;
            font-weight: 800;
        }

        .btn-wsp {
            background: #00ff7f;
            padding: 10px 18px;
            border-radius: 10px;
            color: #000;
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-wsp:hover {
            background: #00e676;
        }
    </style>
</head>

<body>

<header class="header">
    <a href="index.html" class="back">← Volver</a>
</header>

<div class="servicios-container">
    <h1>Elige tu servicio</h1>

    <div class="grid-servicios">
        <button class="servicio" onclick="mostrarPlanes('netflix')">Netflix</button>
        <button class="servicio" onclick="mostrarPlanes('disney')">Disney+</button>
        <button class="servicio" onclick="mostrarPlanes('hbo')">HBO Max</button>
        <button class="servicio" onclick="mostrarPlanes('prime')">Prime Video</button>
        <button class="servicio" onclick="mostrarPlanes('crunchy')">Crunchyroll</button>
        <button class="servicio" onclick="mostrarPlanes('iptv')">IPTV</button>
        <button class="servicio" onclick="mostrarPlanes('flujo')">FlujoTV</button>
        <button class="servicio" onclick="mostrarPlanes('spotify')">Spotify</button>
        <button class="servicio" onclick="mostrarPlanes('youtube')">YouTube</button>
    </div>
</div>

<div id="planes-container"></div>

<script>
const planes = {
    netflix: [
        { meses: 1, precio: 6 },
        { meses: 3, precio: 16 },
        { meses: 6, precio: 30 },
        { meses: 12, precio: 55 }
    ],
    disney: [
        { meses: 1, precio: 6 },
        { meses: 3, precio: 15 },
        { meses: 6, precio: 25 },
        { meses: 12, precio: 45 }
    ],
    hbo: [
        { meses: 1, precio: 6 },
        { meses: 3, precio: 15 },
        { meses: 6, precio: 25 },
        { meses: 12, precio: 45 }
    ],
    prime: [
        { meses: 1, precio: 5 },
        { meses: 3, precio: 14 },
        { meses: 6, precio: 25 },
        { meses: 12, precio: 40 }
    ],
    crunchy: [
        { meses: 1, precio: 6 }
    ],
    iptv: [
        { meses: 1, precio: 10 },
        { meses: 3, precio: 24 },
        { meses: 6, precio: 35 },
        { meses: 12, precio: 55 }
    ],
    flujo: [
        { meses: 1, precio: 10 },
        { meses: 3, precio: 25 },
        { meses: 6, precio: 40 },
        { meses: 12, precio: 60 }
    ],
    spotify: [
        { meses: 1, precio: 7 },
        { meses: 3, precio: 20 }
    ],
    youtube: [
        { meses: 3, precio: 20 }
    ]
};

function mostrarPlanes(servicio) {
    const contenedor = document.getElementById("planes-container");
    const lista = planes[servicio];

    let html = `
        <h2 style="text-align:center; margin-top:20px;">Planes de ${servicio.toUpperCase()}</h2>
        <table class="tabla-planes">
            <tr><th>Duración</th><th>Precio</th><th>Acción</th></tr>
    `;

    lista.forEach(p => {
        html += `
            <tr>
                <td>${p.meses} meses</td>
                <td>${p.precio}€</td>
                <td><button class="btn-wsp" onclick="comprar(${p.precio}, ${p.meses})">Comprar</button></td>
            </tr>
        `;
    });

    html += `</table>`;
    contenedor.innerHTML = html;
}

function comprar(precio, meses) {
    window.location.href = `https://wa.me/34624063991?text=Hola,%20quiero%20comprar%20el%20plan%20de%20${meses}%20mes(es)%20por%20${precio}€`;
}
</script>

</body>
</html>
